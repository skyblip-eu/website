version: 2
updates:
  - package-ecosystem: bundler
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    commit-message:
      prefix: "deps(gems)"
    groups:
      gems:
        patterns: ["*"]
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    commit-message:
      prefix: "deps(actions)"
    groups:
      actions:
        patterns: ["*"]
